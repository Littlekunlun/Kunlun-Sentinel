SelectFB: &SelectFB {type: select, proxies: [一键智能, 团子招牌ION Smart组, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接]}
SelectPY: &SelectPY {type: select, proxies: [默认代理, 团子招牌ION Smart组, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动, 直接连接]}
SelectDC: &SelectDC {type: select, proxies: [直接连接, 默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 冷门自选, 全球手动]}

# ==================== 代理提供者 ====================
proxy-providers:
  团子机场: {<<: *BaseProvider, url: '这里填写你的订阅链接', override: {additional-prefix: '[团子] ', client-fingerprint: chrome}}

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
redir-port: 9797
mixed-port: 7893
tproxy-port: 9898
ipv6: true
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: info
bind-address: '127.0.0.1'
find-process-mode: 'always'
keep-alive-interval: 30
keep-alive-idle: 600

experimental:
  quic-go-disable-gso: true

lgbm-auto-update: true
lgbm-update-interval: 72
lgbm-url: "https://v6.gh-proxy.org/https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin"

profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100

sniffer:
  enable: true
  override-destination: true 
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ==================== TUN 配置 (Windows 极限优化版) ====================
tun:
  enable: true
  mtu: 9000
  device: meta
  stack: system                # [Win11 适配] 性能远超 gvisor，更低的 CPU 占用
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  endpoint-independent-nat: true
  auto-detect-interface: true

hosts:
  miwifi.com: 192.168.31.2
  services.googleapis.cn: services.googleapis.com
  cn.bing.com: global.bing.com

# ==================== DNS 配置 (Rev 3.1 确定性闭环) ====================
dns:
  enable: true
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  cache-algorithm: arc
  prefer-h3: false
  listen: 127.0.0.1:1053
  
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12
    - 8.8.8.8
    - 1.0.0.1
  
  nameserver-policy:
    "+.miwifi.com": "dhcp://system"
    "dns.alidns.com": [223.5.5.5, 223.6.6.6]
    "doh.pub": [1.12.12.12, 120.53.53.53]
    "dns.google": [8.8.8.8, 8.8.4.4]
    "cloudflare-dns.com": [1.1.1.1, 1.0.0.1]
    
  fake-ip-range: 198.18.0.1/16
  enhanced-mode: fake-ip
  respect-rules: true
  
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query   # [Rev 3.1] 物理 IP 握手，极致秒连
    - https://doh.pub/dns-query
    
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,Direct,real-ip
    - RULE-SET,Private,real-ip
    - RULE-SET,China,real-ip
    - RULE-SET,fakeip-filter,real-ip
    - DOMAIN-SUFFIX,pub.3gppnetwork.org,real-ip
    - DOMAIN-SUFFIX,bing.com,real-ip
    - DOMAIN-SUFFIX,miwifi.com,real-ip
    - DOMAIN-SUFFIX,docker.io,real-ip
    - DOMAIN-SUFFIX,market.xiaomi.com,real-ip
    - DOMAIN-SUFFIX,push.apple.com,real-ip
    - MATCH,fake-ip                # [Rev 3.1] 封口逻辑，建立确定性闭环

